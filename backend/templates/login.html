<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login - JoshAI Karaoke Generator</title>

    <link rel="stylesheet" href="/static/login.css">

</head>

<body>

<div class="container">

    <div class="card">

        <h1>🎵 JoshAI Karaoke Generator</h1>

   <h1 id="loginTitle">Login</h1>

        <input
            type="text"
            id="username"
            placeholder="Username or Email"
        >

        <input
            type="password"
            id="password"
            placeholder="Password"
        >

        <button id="loginBtn">
            Login
        </button>

        <p id="status"></p>

        <p class="register-text">

            Don't have an account?

            <a href="/register">

                Register

            </a>

        </p>

    </div>

</div>

<script src="/static/login.js"></script>

</body>

</html>
