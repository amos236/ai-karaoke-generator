<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Register - JoshAI Karaoke Generator</title>

    <link rel="stylesheet" href="/static/register.css">

</head>

<body>

<div class="container">

    <div class="card">

        <h1>🎵 JoshAI Karaoke Generator</h1>

        <h2>Create Account</h2>

        <input
            type="text"
            id="username"
            placeholder="Username"
        >

        <input
            type="email"
            id="email"
            placeholder="Email Address"
        >

        <input
            type="password"
            id="password"
            placeholder="Password"
        >

        <input
            type="password"
            id="confirmPassword"
            placeholder="Confirm Password"
        >

        <button id="registerBtn">
            Register
        </button>

        <p id="status"></p>

        <hr>

        <p>

            Already have an account?

            <a href="/login">

                Login

            </a>

        </p>

    </div>

</div>

<script src="/static/register.js"></script>

</body>

</html>
