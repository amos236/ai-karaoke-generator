<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Admin Login</title>

    <link rel="stylesheet"
          href="/static/admin_login.css">

</head>

<body>

<div class="container">

    <div class="card">

        <div class="logo">

            🎵

        </div>

        <h1>JoshAI Karaoke Generator</h1>

        <h2>Administrator Login</h2>

        <input
            type="text"
            id="username"
            placeholder="Admin Username"
        >

        <input
            type="password"
            id="password"
            placeholder="Admin Password"
        >

        <button id="loginBtn">

            Login

        </button>

        <p id="status"></p>

        <div class="links">

            <a href="/login">

                ← Back to User Login

            </a>

        </div>

    </div>

</div>

<script src="/static/admin_login.js"></script>

</body>

</html>
